services:
  api:
    build: .
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://quiz:quiz@postgres:5432/quiz_dev
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET: change-me-in-local-env
      JWT_EXPIRES_IN: 3600
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quiz_dev
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quiz -d quiz_dev']
      interval: 5s
      timeout: 5s
      retries: 10
